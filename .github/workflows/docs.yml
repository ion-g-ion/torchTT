name: website

# build the documentation whenever there are new commits on main or tags are pushed
# only after tests pass
on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main

# security: restrict permissions for CI jobs.
permissions:
  contents: read

jobs:
  # Build the documentation and upload the static HTML files as an artifact.
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      # Upgrade pip, setuptools, and wheel
      - run: pip install --upgrade pip setuptools wheel
      
      # Install torch first (required by setup.py)
      - run: pip install torch
      
      # Install the package with [dev] dependencies (includes sphinx, sphinx_rtd_theme, nbsphinx, etc.)
      - run: pip install -e ".[dev]"
      
      # Build the documentation
      - run: make html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  # Deploy the artifact to GitHub pages.
  # This is a separate job so that only actions/deploy-pages has the necessary permissions.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4